<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashUp Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Enhanced localStorage with better persistence
    const storage = {
      get: (key) => {
        try {
          const item = localStorage.getItem(key);
          if (!item) return null;
          return JSON.parse(item);
        } catch (e) {
          console.error('Storage get error:', e);
          return null;
        }
      },
      set: (key, value) => {
        try {
          localStorage.setItem(key, JSON.stringify(value));
          sessionStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (e) {
          console.error('Storage set error:', e);
          alert('Warning: Data might not be saved. Check Safari settings.');
          return false;
        }
      },
      remove: (key) => {
        try {
          localStorage.removeItem(key);
          sessionStorage.removeItem(key);
        } catch (e) {
          console.error('Storage remove error:', e);
        }
      }
    };

    // Icons
    const PlusIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    );
    
    const TrashIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    );
    
    const DollarIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
    );
    
    const CalendarIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    );
    
    const RefreshIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    );
    
    const DownloadIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
    );
    
    const UploadIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
    );

    function SimpleLoadTracker() {
      const [loads, setLoads] = useState([]);
      const [amount, setAmount] = useState('');
      const [datetime, setDatetime] = useState('');
      const [forecast, setForecast] = useState([]);
      const [successMessage, setSuccessMessage] = useState('');
      const [storageWarning, setStorageWarning] = useState(false);
      const [summary, setSummary] = useState({ last7d: 0, last30d: 0, count7d: 0, count30d: 0 });

      useEffect(() => {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        const minute = String(now.getMinutes()).padStart(2, '0');
        setDatetime(`${year}-${month}-${day}T${hour}:${minute}`);
      }, []);

      useEffect(() => {
        let saved = storage.get('simple-loads');
        if (!saved) {
          saved = storage.get('simple-loads-backup');
        }
        
        if (saved && Array.isArray(saved) && saved.length > 0) {
          setLoads(saved);
          console.log('Loaded', saved.length, 'transactions from storage');
        }
        
        try {
          localStorage.setItem('test', 'test');
          localStorage.removeItem('test');
        } catch (e) {
          setStorageWarning(true);
        }
      }, []);

      useEffect(() => {
        if (loads.length > 0) {
          storage.set('simple-loads', loads);
          storage.set('simple-loads-backup', loads);
          console.log('Saved', loads.length, 'transactions to storage');
        }
      }, [loads]);

      useEffect(() => {
        if (loads.length > 0) {
          calculateForecast();
          calculateSummary();
        }
      }, [loads]);

      const addLoad = () => {
        if (!amount || !datetime) {
          alert('Please enter both amount and date/time');
          return;
        }

        const amt = parseFloat(amount);
        if (amt > 500) {
          alert('Maximum load is $500 per transaction');
          return;
        }

        const newLoad = {
          id: Date.now().toString(),
          datetime: datetime.replace('T', ' '),
          amount: amt,
          timestamp: new Date(datetime).getTime()
        };

        const updatedLoads = [...loads, newLoad].sort((a, b) => a.timestamp - b.timestamp);
        setLoads(updatedLoads);
        
        setSuccessMessage(`$${amt.toFixed(2)} load successfully`);
        setTimeout(() => setSuccessMessage(''), 3000);
        
        setAmount('');
        
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        const minute = String(now.getMinutes()).padStart(2, '0');
        setDatetime(`${year}-${month}-${day}T${hour}:${minute}`);
      };

      const deleteLoad = (id) => {
        const updated = loads.filter(l => l.id !== id);
        setLoads(updated);
        if (updated.length === 0) {
          storage.remove('simple-loads');
          storage.remove('simple-loads-backup');
        }
      };

      const exportData = () => {
        const dataStr = JSON.stringify(loads, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `loads-backup-${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
      };

      const importData = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
              setLoads(imported);
              alert(`Successfully imported ${imported.length} loads!`);
            } else {
              alert('Invalid backup file format');
            }
          } catch (error) {
            alert('Error reading backup file');
          }
        };
        reader.readAsText(file);
      };

      const calculateSummary = () => {
        const now = new Date();
        const nowTimestamp = now.getTime();
        const last7d = nowTimestamp - 7 * 24 * 60 * 60 * 1000;
        const last30d = nowTimestamp - 30 * 24 * 60 * 60 * 1000;

        const loadsLast7d = loads.filter(l => l.timestamp > last7d && l.timestamp <= nowTimestamp);
        const loadsLast30d = loads.filter(l => l.timestamp > last30d && l.timestamp <= nowTimestamp);

        const sum7d = loadsLast7d.reduce((sum, l) => sum + l.amount, 0);
        const sum30d = loadsLast30d.reduce((sum, l) => sum + l.amount, 0);

        setSummary({
          last7d: sum7d,
          last30d: sum30d,
          count7d: loadsLast7d.length,
          count30d: loadsLast30d.length
        });
      };

      const calculateForecast = () => {
        const now = new Date();
        const nowTimestamp = now.getTime();
        const results = [];
        const LOAD_AMOUNT = 498; // Default load amount

        const historicalLoads = loads.filter(l => l.timestamp <= nowTimestamp);
        const projectedLoads = [...historicalLoads];

        for (let dayOffset = 0; dayOffset < 7; dayOffset++) {
          const targetDate = new Date(now);
          targetDate.setDate(targetDate.getDate() + dayOffset);
          targetDate.setHours(0, 0, 0, 0);

          let maxLoadCount = 0;
          let bestTime = null;

          // Check each minute of the day
          for (let hour = 0; hour < 24; hour++) {
            for (let minute = 0; minute < 60; minute += 1) {
              const checkTime = new Date(targetDate);
              checkTime.setHours(hour, minute, 0, 0);
              const checkTimestamp = checkTime.getTime();

              if (checkTimestamp < nowTimestamp) continue;

              // Calculate limits at this specific time
              const last7d = checkTimestamp - 7 * 24 * 60 * 60 * 1000;
              const last30d = checkTimestamp - 30 * 24 * 60 * 60 * 1000;

              // Amount sums
              const sum7d = projectedLoads
                .filter(l => l.timestamp > last7d && l.timestamp < checkTimestamp)
                .reduce((sum, l) => sum + l.amount, 0);

              const sum30d = projectedLoads
                .filter(l => l.timestamp > last30d && l.timestamp < checkTimestamp)
                .reduce((sum, l) => sum + l.amount, 0);

              // Available amounts
              const available7d = 5000 - sum7d;
              const available30d = 10000 - sum30d;

              // Calculate max loads based on amount limits
              const maxByAmount = Math.floor(Math.min(available7d, available30d) / LOAD_AMOUNT);
              
              const canLoadCount = Math.max(0, maxByAmount);

              if (canLoadCount > 0 && canLoadCount > maxLoadCount) {
                maxLoadCount = canLoadCount;
                bestTime = checkTime;
              }
            }
          }

          const dateStr = targetDate.toISOString().split('T')[0];
          results.push({
            date: dateStr,
            loadCount: maxLoadCount,
            amount: maxLoadCount * LOAD_AMOUNT,
            time: bestTime
          });

          // Add projected loads for this day
          if (maxLoadCount > 0 && bestTime) {
            for (let i = 0; i < maxLoadCount; i++) {
              projectedLoads.push({
                id: `projected-${dayOffset}-${i}`,
                datetime: bestTime.toISOString().replace('T', ' ').slice(0, 16),
                amount: LOAD_AMOUNT,
                timestamp: bestTime.getTime() + (i * 60000) // 1 minute apart
              });
            }
          }
        }

        setForecast(results);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-green-100 p-4">
          <div className="max-w-2xl mx-auto">
            {storageWarning && (
              <div className="bg-yellow-100 border-2 border-yellow-500 text-yellow-800 px-4 py-3 rounded-lg mb-4">
                ⚠️ Storage may not work properly. Check Safari settings: Settings → Safari → Disable "Block All Cookies"
              </div>
            )}
            
            <div className="bg-white rounded-2xl shadow-xl p-6 mb-6">
              <div className="flex items-center justify-between mb-6">
                <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                  <DollarIcon />
                  CashUp Tracker
                </h1>
              </div>
              
              {loads.length > 0 && (
                <div className="bg-gradient-to-r from-blue-50 to-green-50 rounded-lg p-4 mb-4 border-2 border-blue-200">
                  <div className="font-bold text-gray-800 mb-3 text-lg">📊 Summary</div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-white rounded-lg p-3">
                      <div className="text-sm text-gray-600 mb-1">Last 7 Days</div>
                      <div className="text-2xl font-bold text-blue-600">${summary.last7d.toFixed(2)}</div>
                      <div className="text-xs text-gray-500">{summary.count7d} load{summary.count7d !== 1 ? 's' : ''}</div>
                      <div className="text-xs text-green-600 mt-1">${(5000 - summary.last7d).toFixed(2)} remaining</div>
                    </div>
                    <div className="bg-white rounded-lg p-3">
                      <div className="text-sm text-gray-600 mb-1">Last 30 Days</div>
                      <div className="text-2xl font-bold text-green-600">${summary.last30d.toFixed(2)}</div>
                      <div className="text-xs text-gray-500">{summary.count30d} load{summary.count30d !== 1 ? 's' : ''}</div>
                      <div className="text-xs text-green-600 mt-1">${(10000 - summary.last30d).toFixed(2)} remaining</div>
                    </div>
                  </div>
                </div>
              )}
              
              <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-3 mb-4 text-sm">
                <div className="font-semibold text-blue-900 mb-1">💾 Data Backup</div>
                <div className="text-blue-800 mb-2">Your data saves automatically, but you can backup/restore:</div>
                <div className="flex gap-2">
                  <button
                    onClick={exportData}
                    className="flex items-center gap-1 px-3 py-1.5 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm"
                  >
                    <DownloadIcon />
                    Export
                  </button>
                  <label className="flex items-center gap-1 px-3 py-1.5 bg-green-600 text-white rounded hover:bg-green-700 text-sm cursor-pointer">
                    <UploadIcon />
                    Import
                    <input type="file" accept=".json" onChange={importData} className="hidden" />
                  </label>
                </div>
              </div>

              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    Amount ($) - Max $500
                  </label>
                  <input
                    type="number"
                    step="0.01"
                    value={amount}
                    onChange={(e) => setAmount(e.target.value)}
                    placeholder="498.00"
                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    Date & Time
                  </label>
                  <input
                    type="datetime-local"
                    value={datetime}
                    onChange={(e) => setDatetime(e.target.value)}
                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  />
                </div>

                <button
                  onClick={addLoad}
                  className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors flex items-center justify-center gap-2"
                >
                  <PlusIcon />
                  Add Load
                </button>
                
                {successMessage && (
                  <div className="bg-green-100 border-2 border-green-500 text-green-700 px-4 py-3 rounded-lg text-center font-semibold">
                    {successMessage}
                  </div>
                )}
              </div>

              <div className="bg-green-50 rounded-lg p-4 text-sm space-y-1">
                <div className="font-bold text-green-900 mb-2">Loading Limits:</div>
                <div className="text-green-800">• $500 max per transaction</div>
                <div className="text-green-800">• $5,000 max per 7 days</div>
                <div className="text-green-800">• $10,000 max per 30 days</div>
                <div className="text-green-800 mt-2 italic">💡 Using $498 per load for forecast</div>
              </div>
            </div>

            {forecast.length > 0 && (
              <div className="bg-white rounded-2xl shadow-xl p-6 mb-6">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <CalendarIcon />
                    7-Day Load Forecast
                  </h2>
                  <button
                    onClick={calculateForecast}
                    className="flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition-colors"
                  >
                    <RefreshIcon />
                    Refresh
                  </button>
                </div>
                <div className="space-y-3">
                  {forecast.map((day, idx) => (
                    <div
                      key={idx}
                      className={`p-4 rounded-lg ${
                        day.loadCount === 0 
                          ? 'bg-red-50 border-2 border-red-200' 
                          : 'bg-green-50 border-2 border-green-200'
                      }`}
                    >
                      {day.loadCount === 0 ? (
                        <div>
                          <div className="font-bold text-red-700 text-lg">{day.date}</div>
                          <div className="text-red-600 font-semibold">Sorry, Can't Load Today!</div>
                        </div>
                      ) : (
                        <div>
                          <div className="font-bold text-green-700 text-lg">
                            {day.date} {day.time ? `${String(day.time.getHours()).padStart(2, '0')}:${String(day.time.getMinutes()).padStart(2, '0')}` : ''}
                          </div>
                          <div className="text-green-600 font-semibold">
                            You can load {day.loadCount} time{day.loadCount > 1 ? 's' : ''} (${day.amount} total)!
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {loads.length > 0 && (
              <div className="bg-white rounded-2xl shadow-xl p-6">
                <h2 className="text-xl font-bold text-gray-800 mb-4">
                  Load History ({loads.length} loads)
                </h2>
                <div className="space-y-2 max-h-96 overflow-y-auto">
                  {loads.slice().reverse().map((load) => (
                    <div
                      key={load.id}
                      className="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors"
                    >
                      <div>
                        <div className="font-bold text-gray-800">
                          ${load.amount.toFixed(2)}
                        </div>
                        <div className="text-sm text-gray-600">
                          {load.datetime.replace(/(\d{1,2}):(\d{2})(?::(\d{2}))?$/, (match, h, m) => {
                            return `${String(h).padStart(2, '0')}:${m}`;
                          })}
                        </div>
                      </div>
                      <button
                        onClick={() => deleteLoad(load.id)}
                        className="text-red-500 hover:text-red-700 p-2"
                      >
                        <TrashIcon />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<SimpleLoadTracker />, document.getElementById('root'));
  </script>
</body>
</html>
